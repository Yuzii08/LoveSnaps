name: lovesnaps
description: A couple connection app with home-screen widgets for days together, streaks, and distance.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.8.0
  firebase_storage: ^11.6.0

  # Home Screen Widgets
  home_widget: ^0.8.1

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Notifications (local)
  flutter_local_notifications: ^17.1.2

  # Navigation
  go_router: ^13.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI & Utils
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  equatable: ^2.0.5
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  url_launcher: ^6.2.6
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
