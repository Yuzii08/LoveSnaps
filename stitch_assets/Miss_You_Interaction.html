<span class="material-symbols-outlined text-6xl text-error drop-shadow-[0_0_15px_rgba(255,182,193,0.8)]" style="font-variation-settings: 'FILL' 1;">
                favorite

<p class="font-title-md text-title-md text-on-surface-variant bg-white/50 px-6 py-2 rounded-full marshmallow-shadow-1 mt-4 backdrop-blur-sm">

</div>

        </button>

<!-- Navigation Shell (Hidden for this transactional/overlay screen, but keeping structure if needed for context, though guidelines say to suppress) -->
<!-- Suppressed Bottom Nav per guidelines for transactional/overlay screens -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('hearts-container');
            const numHearts = 40;
            const symbols = ['favorite', 'volunteer_activism', 'sparkles', 'favorite_border'];
            const colors = ['text-error', 'text-[#ffb6c1]', 'text-secondary-container', 'text-primary-container'];

            for (let i = 0; i < numHearts; i++) {
                const heart = document.createElement('span');
                
                // Randomize icon
                const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                heart.className = `material-symbols-outlined floating-heart ${colors[Math.floor(Math.random() * colors.length)]}`;
                heart.innerText = randomSymbol;

                // Randomize fill
                if (Math.random() > 0.5) {
                     heart.style.fontVariationSettings = "'FILL' 1";
                }

                // Randomize properties
                const size = Math.random() * 2 + 1; // 1rem to 3rem
                const left = Math.random() * 100; // 0% to 100%
                const duration = Math.random() * 4 + 3; // 3s to 7s
                const delay = Math.random() * 2; // 0s to 2s

                heart.style.fontSize = `${size}rem`;
                heart.style.left = `${left}%`;
                heart.style.animationDuration = `${duration}s`;
                heart.style.animationDelay = `${delay}s`;

                container.appendChild(heart);
            }
        });
    </script>
