<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LoveSnaps - Streak Detail</title>

                        "background": "#f8f9fe",

                        "primary": "#5c5d6e",
                        "on-secondary-fixed-variant": "#134c64",
                        "error": "#ba1a1a",

<style>
        .marshmallow-shadow-1 { box-shadow: 0px 8px 24px rgba(204, 204, 255, 0.2); }
        .marshmallow-shadow-2 { box-shadow: 0px 12px 32px rgba(255, 182, 193, 0.3); }
        .marshmallow-shadow-alert { box-shadow: 0px 8px 24px rgba(255, 218, 214, 0.4); }
        
        .pulse-soft {
            animation: pulse-soft 2s infinite ease-in-out;
        }
        
        @keyframes pulse-soft {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container text-on-surface min-h-screen font-body-lg flex flex-col md:hidden selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Top Navigation (Contextual departure) -->
<header class="flex justify-between items-center w-full px-6 pt-6 pb-4 bg-transparent z-10 relative">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/50 backdrop-blur-md marshmallow-shadow-1 text-primary hover:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-md text-title-md text-primary">Our Streak</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-container-padding pb-32 gap-stack-md overflow-y-auto">
<!-- Hero: Glowing Flame/Heart -->
<section class="flex flex-col items-center justify-center py-8 relative">
<div class="absolute inset-0 bg-gradient-to-b from-error-container/30 to-transparent rounded-full blur-3xl -z-10"></div>
<div class="relative w-48 h-48 flex items-center justify-center pulse-soft">
<!-- Outer glow ring -->
<div class="absolute inset-0 bg-error-container rounded-full blur-xl opacity-60"></div>
<!-- Core Flame/Heart icon -->
<span class="material-symbols-outlined text-8xl text-error drop-shadow-md z-10" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<h2 class="font-display-lg text-display-lg text-error mt-4">12 Days</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2 text-center">You're on fire! Keep the love glowing.</p>
</section>
<!-- Warning State Banner -->
<div class="bg-[#FFF4E5] rounded-[24px] p-5 flex items-center gap-4 marshmallow-shadow-alert border border-[#FFE0B2]/50">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center flex-shrink-0 shadow-sm">
<span class="material-symbols-outlined text-[#F57C00]" style="font-variation-settings: 'FILL' 1;">sentiment_sad</span>
</div>
<div class="flex-1">
<h3 class="font-title-md text-title-md text-[#E65100]">Streak at risk!</h3>
<p class="font-body-sm text-body-sm text-[#F57C00] mt-1">Send a snap in the next 4 hours.</p>
</div>
</div>
<!-- Calendar Strip -->
<section class="bg-surface rounded-[24px] p-6 marshmallow-shadow-1 flex flex-col gap-4">
<h3 class="font-title-md text-title-md text-primary">Last 7 Days</h3>
<div class="flex justify-between items-center">
<!-- Day 1 -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">M</span>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-error" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Day 2 -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">T</span>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-error" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Day 3 -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">W</span>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-error" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Day 4 -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">T</span>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-error" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Day 5 -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">F</span>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-error" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Day 6 -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">S</span>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-error" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Day 7 (Today - Missing) -->
<div class="flex flex-col items-center gap-2">
<span class="font-label-bold text-label-bold text-primary">S</span>
<div class="w-8 h-8 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center bg-surface-container-low">
<span class="material-symbols-outlined text-sm text-outline-variant" style="font-variation-settings: 'FILL' 0;">favorite</span>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Action Area (Replacing Bottom Nav for transactional focus) -->
<div class="fixed bottom-0 left-0 right-0 p-container-padding bg-gradient-to-t from-primary-container via-primary-container/90 to-transparent z-40 pb-8">
<button class="w-full py-4 rounded-full bg-[#FFB6C1] text-white font-title-md text-title-md marshmallow-shadow-2 active:scale-95 transition-transform duration-200 flex justify-center items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
            Remind Partner
        </button>
</div>
</body></html>
